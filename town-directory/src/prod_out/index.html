<!DOCTYPE html>
<html lang="en">

<head>

        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@400;600;700&display=swap"

</head>

<body>

    <!-- Auth Screen -->
    <div id="auth-screen">
        <div class="auth-backdrop">
            <div class="auth-card">
                <h1 class="auth-brand">&#9876;&#65039; Eon Weaver</h1>
                <p class="auth-tagline">AI-Powered Campaign Manager</p>

                <div id="auth-error" class="auth-error" style="display:none"></div>

                <form id="login-form" class="auth-form">
                    <input type="text" id="login-username" placeholder="Username or Email" required class="form-input">
                    <div class="pw-wrapper"><input type="password" id="login-password" placeholder="Password" required class="form-input"><button type="button" class="pw-toggle" data-target="login-password" aria-label="Show password">👁️</button></div>
                    <button type="submit" class="btn-primary">Sign In</button>
                    <p class="auth-switch">No account? <a href="#" id="show-register">Register</a></p>
                </form>

                <form id="register-form" class="auth-form" style="display:none">
                    <input type="text" id="reg-username" placeholder="Username" required class="form-input">
                    <input type="email" id="reg-email" placeholder="Email" required class="form-input">
                    <div class="pw-wrapper"><input type="password" id="reg-password" placeholder="Password" required class="form-input"><button type="button" class="pw-toggle" data-target="reg-password" aria-label="Show password">👁️</button></div>
                    <input type="text" id="reg-beta-key" placeholder="Beta Key" required class="form-input"
                        autocomplete="off">
                    <small class="auth-hint">A beta key is required to create an account during early access.</small>
                    <button type="submit" class="btn-primary">Create Account</button>
                    <p class="auth-switch">Already have an account? <a href="#" id="show-login">Sign In</a></p>
                </form>
            </div>
        </div>
    </div>

    <!-- Main App Layout -->
    <div id="main-app" style="display:none">
        <div id="sidebar-container"></div>
        <main id="app-content" class="app-content"></main>
    </div>
